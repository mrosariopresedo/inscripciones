name: Monitor de vacantes UADE
# El cron de GitHub es throttleado y poco frecuente. En vez de depender de el,
# cada corrida se AUTO-REPITE: hace un barrido cada ~5 min durante ~5,5 h. El cron
# la relanza varias veces al dia. (Repo publico => minutos ilimitados y gratis.)
#
# cancel-in-progress: false a proposito -> las corridas NO se matan entre si (los
# disparos extra hacen cola). Asi no quedan huecos sin monitorear.

on:
  schedule:
    - cron: '0 */3 * * *'   # cada 3 h (best-effort) para relanzar el loop
  workflow_dispatch:

concurrency:
  group: monitor-vacantes
  cancel-in-progress: false

jobs:
  vacantes:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Traer el repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependencias
        run: pip install selenium beautifulsoup4 requests

      - name: Barridos cada ~1 min (~5,5 h)
        env:
          UADE_USER: ${{ secrets.UADE_USER }}
          UADE_PASS: ${{ secrets.UADE_PASS }}
          PARAM_URL: ${{ secrets.PARAM_URL }}
          WHATSAPP_TELEFONO: ${{ secrets.WHATSAPP_TELEFONO }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
        run: |
          fin=$((SECONDS + 19800))   # ~5,5 h
          fallos=0
          while [ $SECONDS -lt $fin ]; do
            python vacantes.py; code=$?
            if [ $code -eq 0 ]; then
              fallos=0
            elif [ $code -eq 2 ]; then
              echo "Bloqueo detectado (ya avise por WhatsApp): corto la corrida."
              exit 1
            else
              fallos=$((fallos + 1))
              if [ $fallos -ge 5 ]; then
                echo "5 errores seguidos: aviso y corto."
                curl -s -G "https://api.callmebot.com/whatsapp.php" \
                  --data-urlencode "phone=$WHATSAPP_TELEFONO" \
                  --data-urlencode "apikey=$WHATSAPP_APIKEY" \
                  --data-urlencode "text=Monitor UADE: 5 barridos con error seguidos, revisa el workflow." >/dev/null || true
                exit 1
              fi
            fi
            sleep 60
          done
